name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -v
      - name: Run deterministic search benchmark
        run: python bench/run_eval.py --quiet --compare-golden bench/golden.json
      - name: Run deterministic writeback benchmark
        run: python bench/run_writeback_eval.py --quiet --compare-golden bench/writeback/golden.json
