name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install -e .
      - name: Run tests
        run: python -m unittest discover -v
      - name: Run deterministic search benchmark
        run: python bench/run_eval.py --quiet --compare-golden bench/golden.json
      - name: Run deterministic writeback benchmark
        run: python bench/run_writeback_eval.py --quiet --compare-golden bench/writeback/golden.json

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            artifact_name: apollokairn-linux-arm64
            archive_name: apollokairn-linux-arm64.tar.gz
            binary_name: apollokairn
          - os: windows-latest
            artifact_name: apollokairn-windows-x64
            archive_name: apollokairn-windows-x64.zip
            binary_name: apollokairn.exe
          - os: macos-15-intel
            artifact_name: apollokairn-macos-x64
            archive_name: apollokairn-macos-x64.tar.gz
            binary_name: apollokairn
          - os: macos-15
            artifact_name: apollokairn-macos-arm64
            archive_name: apollokairn-macos-arm64.tar.gz
            binary_name: apollokairn
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -e .
      - name: Build standalone binary
        run: pyinstaller --onefile --name apollokairn src/cairn/__main__.py
      - name: Verify standalone binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./dist/apollokairn.exe --version
            ./dist/apollokairn.exe --help
          else
            ./dist/apollokairn --version
            ./dist/apollokairn --help
          fi
      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath "release-assets/${{ matrix.archive_name }}"
      - name: Package Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p release-assets
          chmod +x "dist/${{ matrix.binary_name }}"
          tar -czf "release-assets/${{ matrix.archive_name }}" -C dist "${{ matrix.binary_name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/${{ matrix.archive_name }}

  build-linux-x64:
    needs: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build Linux x64 standalone binary in Debian 11 container
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            python:3.12-slim-bullseye \
            bash -lc "apt-get update && apt-get install -y --no-install-recommends binutils && rm -rf /var/lib/apt/lists/* && python -m pip install --upgrade pip && python -m pip install pyinstaller && python -m pip install -e . && pyinstaller --onefile --name apollokairn src/cairn/__main__.py && chown -R \"$(stat -c '%u:%g' /work)\" dist build apollokairn.spec"
      - name: Verify Linux x64 standalone binary
        run: |
          ./dist/apollokairn --version
          ./dist/apollokairn --help
      - name: Package Linux x64 binary
        run: |
          mkdir -p release-assets
          tar --mode='u+x,go+rx' -czf release-assets/apollokairn-linux-x64.tar.gz -C dist apollokairn
      - uses: actions/upload-artifact@v4
        with:
          name: apollokairn-linux-x64
          path: release-assets/apollokairn-linux-x64.tar.gz

  publish:
    needs: [build, build-linux-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum apollokairn-* > checksums.txt
          cat checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
